name: Staleness Audit
on:
  schedule: [ { cron: "7 9 * * 1" } ]
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npm run audit:staleness
